<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Fee Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="icon" type="image/png" href="logo.png">
</head>

<body>
    <!-- Navbar ============================================== -->
    <section id="navbar" class="sticky-top">
        <nav class="navbar">
            <div class="container d-flex justify-content-between align-items-center">
                <img src="img/logo.png" alt="Profile Photo" class="nav-logo img-fluid rounded-circle">
                <div class="navbar-text mx-3">
                    <h2 id="currentMonth"></h2>
                </div>
                <div>
                    <i class="fa-solid fa-bars" type="button" data-bs-toggle="offcanvas"
                        data-bs-target="#offcanvas"></i>
                </div>
            </div>
        </nav>
    </section>

    <!-- Search Section ====================================== -->
    <section id="haga" class="container mb-3">
        <input id="search" class="px-3 py-2" type="text" placeholder="Search Student">
    </section>

    <!-- Statistics ========================================== -->
    <section id="stat">
        <div class="stats container">
            <div class="card">
                <h3 id="totalStudents">0</h3>
                <p>Students</p>
            </div>

            <div class="card">
                <h3 id="paidStudents">0</h3>
                <p>Paid</p>
            </div>

            <div class="card">
                <h3 id="unpaidStudents">0</h3>
                <p>Unpaid</p>
            </div>

            <div class="card">
                <h3 id="collection">₹0</h3>
                <p>Collection</p>
            </div>
        </div>
    </section>

    <!-- Main Section ======================================== -->
    <section class="container my-3">
        <div id="studentList"></div>
    </section>










    <!-- Offcanvas =============================================================== -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvas" aria-labelledby="offcanvasLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="offcanvasLabel">Menu</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column justify-content-between">
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="add-student.html">Add New Student</a></li>
<li class="nav-item"><a class="nav-link" href="reports.html">Reports</a></li>
            </ul>
            <!-- Bottom Navigation Links -->
            <ul class="nav flex-column mt-auto">
                <li class="nav-item"><a class="nav-link" href="#">About Us</a></li>
            </ul>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
